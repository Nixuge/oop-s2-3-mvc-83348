name: Test & Publish Coverage (xUnit + ReportGenerator)

on:
  workflow_dispatch: 
  push:
    branches: [ master, main ]
  pull_request:

# Avoid overlapping Pages deployments
concurrency:
  group: "pages"
  cancel-in-progress: true

# Required for GitHub Pages deploy
permissions:
  contents: read
  pages: write
  id-token: write

env:
  DOTNET_VERSION: "8.0.x"
  TEST_PROJECT: "VgcCollege.Tests/VgcCollege.Tests.csproj"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Show working directory
        run: pwd

      - name: List root directory
        run: ls -la

      - name: Test (xUnit) and collect coverage
        run: >
          dotnet test $TEST_PROJECT -c Release --no-build
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --logger "trx;LogFileName=test-results.trx"

      # 2. SURGICAL STRIKE: Remove views and save to a BRAND NEW file
      - name: Filter Coverage XML (Remove Views)
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          import glob

          files = glob.glob('**/coverage.cobertura.xml', recursive=True)
          for i, file in enumerate(files):
              tree = ET.parse(file)
              root = tree.getroot()
              removed = 0
              
              # Find and remove any class containing AspNetCoreGeneratedDocument or Views_
              for classes in root.iter('classes'):
                  for cls in list(classes):
                      name = cls.get('name', '')
                      if 'AspNetCoreGeneratedDocument' in name or 'Views_' in name:
                          classes.remove(cls)
                          removed += 1
              
              # Save to a new file in the root directory so ReportGenerator can't read the old one
              new_filename = f'cleaned-coverage-{i}.xml'
              tree.write(new_filename, encoding='utf-8', xml_declaration=True)
              print(f'Successfully removed {removed} view classes from {file}. Saved as {new_filename}')
          "

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      # 3. Generate HTML report pointing strictly to the NEW cleaned file
      - name: Generate HTML coverage report
        run: |
          export PATH="$PATH:~/.dotnet/tools"
          reportgenerator \
            -reports:cleaned-coverage-*.xml \
            -targetdir:coveragereport \
            -reporttypes:Html

      - name: Upload coverage as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coveragereport

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./coveragereport

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
